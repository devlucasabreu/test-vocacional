<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste Vocacional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="wrapper">
      <header class="header">
        <div class="header-tag">Orientação Profissional</div>
        <h1 class="title">Teste <em>Vocacional</em></h1>
        <p class="subtitle">
          Descubra sua área de maior afinidade através de 15 perguntas
          cuidadosamente elaboradas.
        </p>
        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-label" id="progressLabel">0 / 15</span>
        </div>
      </header>

      <main class="card" id="questionContainer">
        <!-- Perguntas aqui -->
      </main>

      <div class="nav-row">
        <button id="nextBtn" class="btn hidden">
          <span>Próxima</span>
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>
      </div>

      <div id="result" class="result-card hidden">
        <div class="result-badge" id="resultBadge"></div>
        <h2 class="result-title">Seu Perfil Vocacional</h2>
        <p class="result-area" id="resultArea"></p>
        <p class="result-text" id="resultText"></p>
        <div class="professions-grid" id="professionsGrid"></div>
        <button class="btn btn-outline" id="restartBtn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="1 4 1 10 7 10" />
            <path d="M3.51 15a9 9 0 1 0 .49-4.01" />
          </svg>
          <span>Refazer o Teste</span>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
